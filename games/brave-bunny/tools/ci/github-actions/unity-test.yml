# unity-test.yml — Brave Bunny EditMode + PlayMode test runner.
#
# Owner: build-engineer. Cross-ref: tech-spec 10-build-and-ci.md.
#
# COST AWARENESS — also runs on macos-14 (cost-aware: 10x Linux multiplier).
# Triggered only on PRs that touch unity/ or data/ paths so unrelated PRs
# don't burn mac-minutes.
#
# DESTINATION: copy or symlink to .github/workflows/unity-test.yml.

name: unity-test

on:
  pull_request:
    paths:
      - "games/brave-bunny/unity/**"
      - "games/brave-bunny/data/**"
      - "games/brave-bunny/tools/ci/github-actions/unity-test.yml"

jobs:
  test:
    runs-on: macos-14         # mac required for iOS-equivalent rendering tests
    timeout-minutes: 45

    env:
      UNITY_VERSION: 6000.0.31f1

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 1

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: games/brave-bunny/unity/Library
          key: Library-brave-bunny-test-${{ hashFiles('games/brave-bunny/unity/Packages/manifest.json') }}
          restore-keys: |
            Library-brave-bunny-test-
            Library-brave-bunny-

      - name: Run Unity tests (EditMode + PlayMode)
        uses: game-ci/unity-test-runner@v4
        with:
          projectPath: games/brave-bunny/unity
          unityVersion: ${{ env.UNITY_VERSION }}
          testMode: all
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          coverageOptions: "generateAdditionalMetrics;generateHtmlReport;generateBadgeReport;assemblyFilters:+Brave.*,-Brave.Tests.*"
          artifactsPath: artifacts
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-test-results-${{ github.run_number }}
          path: artifacts/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-coverage-${{ github.run_number }}
          path: games/brave-bunny/unity/CodeCoverage/
          retention-days: 14
          if-no-files-found: ignore
