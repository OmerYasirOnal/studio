<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Boss Warning: bold danger triangle with skull silhouette -->
  <!-- Triangle outline -->
  <polygon points="32,4 60,58 4,58" fill="none" stroke="#2E2A28" stroke-width="4" stroke-linejoin="round"/>
  <!-- Skull circle (head) -->
  <circle cx="32" cy="34" r="11" fill="#2E2A28"/>
  <!-- Skull eye sockets -->
  <circle cx="27" cy="33" r="3" fill="white"/>
  <circle cx="37" cy="33" r="3" fill="white"/>
  <!-- Skull jaw notches -->
  <rect x="27" y="43" width="4" height="5" rx="1" fill="white"/>
  <rect x="33" y="43" width="4" height="5" rx="1" fill="white"/>
  <!-- Exclamation dot above skull -->
  <circle cx="32" cy="16" r="3" fill="#2E2A28"/>
</svg>
