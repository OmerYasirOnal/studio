name: observer-smoke

on:
  schedule:
    - cron: "0 13 * * *"   # daily 13:00 UTC
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install
        working-directory: core/observer
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt
      - name: boot & exercise endpoints
        working-directory: core/observer
        run: |
          .venv/bin/python -m uvicorn server:app --host 127.0.0.1 --port 7777 &
          SERVER=$!
          sleep 2
          curl -fsS http://127.0.0.1:7777/health
          echo
          curl -fsS http://127.0.0.1:7777/api/games
          echo
          curl -fsS http://127.0.0.1:7777/api/active-game
          echo
          curl -fsS http://127.0.0.1:7777/api/agents
          echo
          curl -fsS http://127.0.0.1:7777/api/commits
          echo
          kill $SERVER
