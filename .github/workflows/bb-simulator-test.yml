# bb-simulator-test.yml — Brave Bunny iOS Simulator smoke test (Wave 12).
#
# Owner: build-engineer. Cross-ref: runbooks/simulator-smoke.md.
#
# WHY THIS EXISTS:
#   TestFlight processing takes 15+ minutes; if we ship a pink-screen build
#   (missing shader bundle, broken render-pipeline asset, etc.) we waste a
#   build number and Apple's processing queue. This workflow runs the same
#   Unity → Xcode → install → launch → screenshot pipeline against the
#   iOS Simulator in ~3 minutes, catching the pink-shader-error regression
#   class before it ever reaches TestFlight.
#
# WHEN IT RUNS:
#   - workflow_dispatch (manual)
#   - push to main (every merge, but cheap enough — ~3 mac-min)
#   - pull_request when paths touch the Unity project or these scripts
#
# COST: ~3 mac-minutes per run. macOS minutes are 10x Linux minutes against
# the GitHub Free tier 2000 min/mo budget — that's ~30 effective minutes.

name: bb-simulator-test

on:
  workflow_dispatch:
    inputs:
      device:
        description: "iOS Simulator device name"
        required: false
        default: "iPhone 17"
        type: string
  push:
    branches: [main]
    paths:
      - "games/brave-bunny/unity/**"
      - "games/brave-bunny/tools/ci/scripts/build-for-simulator.sh"
      - "games/brave-bunny/tools/ci/scripts/test-in-simulator.sh"
      - "games/brave-bunny/tools/ci/scripts/unity-build-ios.sh"
      - "games/brave-bunny/tools/ci/fastlane/Fastfile"
      - ".github/workflows/bb-simulator-test.yml"
  pull_request:
    branches: [main]
    paths:
      - "games/brave-bunny/unity/**"
      - "games/brave-bunny/tools/ci/scripts/build-for-simulator.sh"
      - "games/brave-bunny/tools/ci/scripts/test-in-simulator.sh"
      - "games/brave-bunny/tools/ci/scripts/unity-build-ios.sh"
      - "games/brave-bunny/tools/ci/fastlane/Fastfile"
      - ".github/workflows/bb-simulator-test.yml"

jobs:
  simulator:
    runs-on: macos-latest
    timeout-minutes: 45

    env:
      UNITY_VERSION: 6000.0.74f1
      UNITY_PROJECT_PATH: games/brave-bunny/unity
      BB_DEVICE: ${{ inputs.device || 'iPhone 17' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 1

      - name: Verify Unity version pin matches ProjectVersion.txt
        shell: bash
        run: |
          PVT="$UNITY_PROJECT_PATH/ProjectSettings/ProjectVersion.txt"
          if [[ ! -f "$PVT" ]]; then
            echo "::error file=$PVT::ProjectVersion.txt missing"
            exit 1
          fi
          PROJ_VER=$(grep '^m_EditorVersion:' "$PVT" | awk '{print $2}')
          if [[ "$PROJ_VER" != "$UNITY_VERSION" ]]; then
            echo "::error::UNITY_VERSION env ($UNITY_VERSION) != ProjectVersion.txt ($PROJ_VER)"
            exit 1
          fi
          echo "Unity version pin OK: $PROJ_VER"

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: ${{ env.UNITY_PROJECT_PATH }}/Library
          key: Library-brave-bunny-iOS-sim-${{ env.UNITY_VERSION }}-${{ hashFiles('games/brave-bunny/unity/Packages/manifest.json', 'games/brave-bunny/unity/ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            Library-brave-bunny-iOS-sim-${{ env.UNITY_VERSION }}-
            Library-brave-bunny-iOS-${{ env.UNITY_VERSION }}-
            Library-brave-bunny-

      - name: Set up Ruby (for Pillow install verification only)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: false

      - name: Install Pillow (pink-pixel inspector)
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install Pillow

      - name: Build Unity → Xcode (simulator SDK)
        run: bash games/brave-bunny/tools/ci/scripts/build-for-simulator.sh
        env:
          GIT_COMMIT_SHA: ${{ github.sha }}

      - name: Install + launch + screenshot + pink check
        run: bash games/brave-bunny/tools/ci/scripts/test-in-simulator.sh
        env:
          BB_DEVICE: ${{ env.BB_DEVICE }}
          BB_SCREENSHOT_OUT: ${{ github.workspace }}/bb-sim-screen.png

      - name: Upload screenshot (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bb-sim-screenshot-${{ github.run_number }}
          path: |
            ${{ github.workspace }}/bb-sim-screen.png
            /tmp/bb-sim-screen.png
          retention-days: 14
          if-no-files-found: warn

      - name: Upload Unity logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bb-sim-unity-logs-${{ github.run_number }}
          path: games/brave-bunny/unity/Logs/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Xcode DerivedData logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bb-sim-xcode-logs-${{ github.run_number }}
          path: |
            /tmp/bb-sim-build/Logs/
          retention-days: 7
          if-no-files-found: ignore
