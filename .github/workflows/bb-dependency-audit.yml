# bb-dependency-audit.yml — Brave Bunny weekly Unity dependency audit.
#
# Owner: build-engineer. Cross-ref: tech-spec 10-build-and-ci.md (Wave 11 — scheduled CI).
#
# WHAT
#   Every Sunday at 05:00 UTC, scans `games/brave-bunny/unity/Packages/manifest.json`
#   for outdated Unity Package Manager (UPM) dependencies. If any are out of date,
#   opens a draft PR with the bumps so they can be reviewed + merged manually.
#
# WHY
#   Dependabot does not cover UPM. Without a scheduled audit, packages silently
#   drift behind Unity LTS, accumulating risk. A weekly draft PR keeps drift
#   visible without forcing automatic merges.
#
# HOW
#   `Packages/manifest.json` is plain JSON. We query the public UPM registry
#   (`https://packages.unity.com/<name>`) for the latest published version of
#   each non-builtin (i.e. non `com.unity.modules.*`) dependency. Git-URL
#   dependencies (e.g. mcp-unity) and scoped registry packages are skipped —
#   they need manual review.
#
# COST AWARENESS
#   Runs on `ubuntu-latest`. Linux minutes — cheap.
#
# TRIGGERS
#   - schedule: 05:00 UTC every Sunday (off-peak so the PR is ready Monday)
#   - workflow_dispatch: manual fallback to test the audit logic
#
# TODO (out of scope this wave)
#   - Slack / Discord notification
#   - PlayMode regression run on the bump PR (covered by bb-unity-test.yml
#     when the PR opens, since it touches `unity/**`)

name: bb-dependency-audit

on:
  schedule:
    - cron: "0 5 * * 0"   # Sunday 05:00 UTC
  workflow_dispatch: {}

concurrency:
  group: bb-dependency-audit
  cancel-in-progress: true

permissions:
  contents: write          # to push the audit branch
  pull-requests: write     # to open the auto-PR
  issues: write            # to add labels / assignees on the PR

jobs:
  audit:
    name: Scan Unity manifest for outdated packages
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Audit manifest.json
        id: audit
        env:
          MANIFEST: games/brave-bunny/unity/Packages/manifest.json
        run: |
          python <<'PY'
          import json, os, sys, urllib.request, urllib.error

          manifest_path = os.environ["MANIFEST"]
          with open(manifest_path) as f:
              manifest = json.load(f)

          deps = manifest.get("dependencies", {})
          updates = {}
          skipped = []
          errors = []

          for name, current in deps.items():
              # Skip Unity builtin modules — version is always "1.0.0" tied to engine
              if name.startswith("com.unity.modules."):
                  continue
              # Skip git URLs / file paths — not in UPM registry
              if not isinstance(current, str) or current.startswith(("http://", "https://", "git+", "file:", "ssh://")):
                  skipped.append((name, current))
                  continue

              url = f"https://packages.unity.com/{name}"
              try:
                  req = urllib.request.Request(url, headers={"Accept": "application/json"})
                  with urllib.request.urlopen(req, timeout=15) as resp:
                      data = json.load(resp)
              except urllib.error.HTTPError as e:
                  if e.code == 404:
                      skipped.append((name, current))
                      continue
                  errors.append((name, f"HTTP {e.code}"))
                  continue
              except Exception as e:
                  errors.append((name, str(e)))
                  continue

              latest = data.get("dist-tags", {}).get("latest")
              if not latest:
                  errors.append((name, "no dist-tags.latest"))
                  continue
              # Only flag stable bumps (skip preview / pre / experimental upgrades
              # if current is on a stable channel — keep human in the loop).
              if latest != current and not any(tag in latest for tag in ("-pre", "-exp", "-preview")):
                  updates[name] = {"from": current, "to": latest}

          summary_lines = []
          if updates:
              summary_lines.append("## Outdated Unity packages\n")
              summary_lines.append("| Package | Current | Latest |")
              summary_lines.append("|---|---|---|")
              for name, info in sorted(updates.items()):
                  summary_lines.append(f"| `{name}` | `{info['from']}` | `{info['to']}` |")
          else:
              summary_lines.append("No outdated Unity packages found. Manifest is up to date.")

          if skipped:
              summary_lines.append("\n### Skipped (git / scoped / unresolved)\n")
              for name, value in skipped:
                  summary_lines.append(f"- `{name}` → `{value}`")

          if errors:
              summary_lines.append("\n### Errors\n")
              for name, msg in errors:
                  summary_lines.append(f"- `{name}` — {msg}")

          summary = "\n".join(summary_lines)
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write(summary + "\n")

          # Apply updates in-place if any.
          if updates:
              for name, info in updates.items():
                  manifest["dependencies"][name] = info["to"]
              with open(manifest_path, "w") as f:
                  json.dump(manifest, f, indent=2)
                  f.write("\n")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"has_updates={'true' if updates else 'false'}\n")
              f.write(f"update_count={len(updates)}\n")
              # Compact body for PR description (no fenced summary headings)
              pr_body_lines = []
              if updates:
                  pr_body_lines.append("Automated weekly Unity package audit. Review before merging.")
                  pr_body_lines.append("")
                  pr_body_lines.append("| Package | From | To |")
                  pr_body_lines.append("|---|---|---|")
                  for name, info in sorted(updates.items()):
                      pr_body_lines.append(f"| `{name}` | `{info['from']}` | `{info['to']}` |")
              pr_body = "\n".join(pr_body_lines)
              # GitHub Actions output multiline pattern
              f.write("pr_body<<EOF_PR_BODY\n")
              f.write(pr_body)
              f.write("\nEOF_PR_BODY\n")
          PY

      - name: Open / refresh PR with updates
        if: steps.audit.outputs.has_updates == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/bb-dep-audit
          base: main
          delete-branch: true
          commit-message: |
            chore(brave-bunny): weekly Unity dependency audit — auto-bump manifest

            Bumps ${{ steps.audit.outputs.update_count }} Unity package(s) to latest
            stable. Generated by .github/workflows/bb-dependency-audit.yml.
            Manual review required before merge — does NOT auto-merge.
          title: "chore(brave-bunny): weekly Unity dependency audit (${{ steps.audit.outputs.update_count }} bumps)"
          body: |
            ${{ steps.audit.outputs.pr_body }}

            ---

            _Filed automatically by bb-dependency-audit.yml — Wave 11 scheduled CI._
            _**Manual review required before merge.** PR is intentionally NOT auto-merged._
          labels: |
            dependencies
            chore
          assignees: OmerYasirOnal
          draft: true
