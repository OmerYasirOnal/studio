name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          npm install --global markdownlint-cli2
          sudo apt-get update && sudo apt-get install -y shellcheck
      - name: ruff (python)
        run: ruff check core/
      - name: shellcheck (bash)
        run: |
          find core/scripts core/.claude/hooks -name "*.sh" -print0 \
            | xargs -0 -n1 shellcheck -S warning -x
      - name: markdownlint (docs)
        run: markdownlint-cli2 "**/*.md" "#core/observer/.venv/**" "#**/node_modules/**" || true
        # Treat markdown lint as advisory — fail later when rules are agreed.

  observer-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install observer
        working-directory: core/observer
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt
      - name: Boot observer and curl health
        working-directory: core/observer
        run: |
          .venv/bin/python -m uvicorn server:app --host 127.0.0.1 --port 7777 &
          SERVER=$!
          # Wait up to 15 s for /health.
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:7777/health >/dev/null 2>&1; then
              echo "observer is healthy"
              kill $SERVER
              exit 0
            fi
            sleep 0.5
          done
          kill $SERVER || true
          echo "observer failed to come up"
          exit 1

  asset-licenses:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate licenses for each game
        run: |
          shopt -s nullglob
          fail=0
          for d in games/*/; do
            game="$(basename "$d")"
            echo ">> $game"
            python core/tools/asset-pipeline/licenses.py --validate --game "$game" || fail=1
          done
          exit $fail
