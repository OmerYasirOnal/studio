# bb-nightly-tests.yml — Brave Bunny nightly EditMode regression run.
#
# Owner: build-engineer. Cross-ref: tech-spec 10-build-and-ci.md (Wave 11 — scheduled CI).
#
# WHAT
#   Runs Unity EditMode tests in batchmode every night at 03:00 UTC against `main`.
#   Uploads NUnit XML + html coverage as a CI artifact. If any test fails, opens
#   (or refreshes) a GitHub issue labelled `ci-failure` and assigned to the
#   repo owner so a human is notified the next morning.
#
# WHY
#   PR-triggered `bb-unity-test.yml` only fires when a PR touches `unity/**`.
#   Asset / data / package drift can silently break EditMode tests in between.
#   A nightly scheduled run catches regressions inside ~24h instead of waiting
#   for the next gameplay PR.
#
# COST AWARENESS
#   `macos-14` is 10x Linux minutes — at one 30-min run/day this is ~300
#   mac-minutes/month, within the 200-budget if other workflows stay quiet.
#   `concurrency` block below prevents queue buildup when a run runs long.
#
# TRIGGERS
#   - schedule: 03:00 UTC every day (06:00 Istanbul, morning summary fits the
#     owner's timezone)
#   - workflow_dispatch: manual fallback so we can test the pipeline itself
#
# TODO (out of scope this wave)
#   - Slack / Discord webhook notification — no webhook configured yet
#   - PlayMode coverage — kept EditMode-only for runtime budget

name: bb-nightly-tests

on:
  schedule:
    # 03:00 UTC daily — keep cron in UTC; runner is timezone-agnostic.
    - cron: "0 3 * * *"
  workflow_dispatch: {}

# Prevent overlapping nightly runs from queueing on top of each other.
concurrency:
  group: bb-nightly-tests
  cancel-in-progress: false

permissions:
  contents: read
  issues: write       # opening / updating the failure issue
  actions: read

jobs:
  editmode:
    name: Unity EditMode (nightly)
    runs-on: macos-14
    timeout-minutes: 45

    env:
      UNITY_VERSION: 6000.0.31f1
      ARTIFACTS_DIR: artifacts

    outputs:
      result: ${{ steps.run-tests.outcome }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          lfs: true
          fetch-depth: 1

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: games/brave-bunny/unity/Library
          key: Library-brave-bunny-nightly-${{ hashFiles('games/brave-bunny/unity/Packages/manifest.json') }}
          restore-keys: |
            Library-brave-bunny-nightly-
            Library-brave-bunny-test-
            Library-brave-bunny-

      - name: Run Unity EditMode tests (batchmode)
        id: run-tests
        uses: game-ci/unity-test-runner@v4
        continue-on-error: true
        with:
          projectPath: games/brave-bunny/unity
          unityVersion: ${{ env.UNITY_VERSION }}
          testMode: EditMode
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          artifactsPath: ${{ env.ARTIFACTS_DIR }}
          customParameters: -batchmode -nographics
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-editmode-results-${{ github.run_number }}
          path: ${{ env.ARTIFACTS_DIR }}/
          retention-days: 14
          if-no-files-found: warn

      - name: Format NUnit XML into markdown summary
        if: always()
        id: report
        run: |
          chmod +x games/brave-bunny/tools/ci/scripts/nightly-test-report.sh
          REPORT_PATH="$RUNNER_TEMP/nightly-report.md"
          games/brave-bunny/tools/ci/scripts/nightly-test-report.sh \
            "${{ env.ARTIFACTS_DIR }}" "$REPORT_PATH" \
            "${{ github.run_id }}" "${{ github.run_number }}" \
            "${{ github.server_url }}/${{ github.repository }}"
          echo "report_path=$REPORT_PATH" >> "$GITHUB_OUTPUT"
          {
            echo "## Nightly EditMode summary"
            cat "$REPORT_PATH"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Open / refresh failure issue
        if: steps.run-tests.outcome == 'failure'
        uses: actions/github-script@v7
        env:
          REPORT_PATH: ${{ steps.report.outputs.report_path }}
        with:
          script: |
            const fs = require('fs');
            const reportPath = process.env.REPORT_PATH;
            let body = '';
            try {
              body = fs.readFileSync(reportPath, 'utf8');
            } catch (e) {
              body = `Could not read report at ${reportPath}: ${e.message}`;
            }
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `[ci-failure] Nightly EditMode tests failed — run #${context.runNumber}`;
            const fullBody = [
              `Nightly EditMode run **failed** on \`main\`.`,
              ``,
              `- Run: ${runUrl}`,
              `- Date (UTC): ${new Date().toISOString()}`,
              ``,
              body,
              ``,
              `_Filed automatically by bb-nightly-tests.yml — Wave 11 scheduled CI._`,
            ].join('\n');

            // Find any open ci-failure issue from this workflow so we don't spam.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci-failure',
              per_page: 50,
            });
            const match = existing.data.find(i => i.title.startsWith('[ci-failure] Nightly EditMode tests failed'));

            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body: fullBody,
              });
              core.info(`Commented on existing ci-failure issue #${match.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: fullBody,
                labels: ['ci-failure'],
                assignees: ['OmerYasirOnal'],
              });
              core.info(`Opened ci-failure issue #${created.data.number}`);
            }

      - name: Fail the job if tests failed
        if: steps.run-tests.outcome == 'failure'
        run: |
          echo "::error::Nightly EditMode tests failed — see issue + artifact."
          exit 1
