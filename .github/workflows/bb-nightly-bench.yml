name: bb-nightly-bench

on:
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC daily
  workflow_dispatch:

jobs:
  bench:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: games/brave-bunny/app
    steps:
      - uses: actions/checkout@v4
      - name: Guard — skip if app/ not yet present
        id: guard
        shell: bash
        run: |
          if [ ! -f games/brave-bunny/app/package.json ]; then
            echo "app/package.json missing — skipping bench"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        working-directory: ${{ github.workspace }}
      - uses: actions/setup-node@v4
        if: steps.guard.outputs.skip != 'true'
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: games/brave-bunny/app/package-lock.json
      - name: Install
        if: steps.guard.outputs.skip != 'true'
        run: npm ci
      - name: Build
        if: steps.guard.outputs.skip != 'true'
        run: npm run build
      - name: Run bench (200-enemy stress)
        if: steps.guard.outputs.skip != 'true'
        run: npm run bench -- --reporter=json --outputFile=bench-results.json
      - name: Upload bench results
        if: steps.guard.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ github.sha }}
          path: games/brave-bunny/app/bench-results.json
          retention-days: 30
